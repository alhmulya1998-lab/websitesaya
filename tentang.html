<!DOCTYPE html>
<html>

<head>
    <title>Profil Saya</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial;
        }

        .navbar {
            background-color: blue;
            padding: 20px;
        }

        .navbar a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            padding: 5px 8px;
            /* biar stabilo ada ruang */
            transition: 0.3s;
            /* efek halus */
        }

        .navbar a:hover {
            background-color: yellow;
            /* efek stabilo */
            color: black;
            /* biar terbaca jelas */
            font-weight: bold;
            border-radius: 5px;
            text-decoration: underline;
        }

        .navbar a:active {
            color: red;
            background-color: whitesmoke;
        }

        .navbar a:visited {
            color: lightgray;
        }

        .card {
            background-color: lightyellow;
            padding: 20px;
            margin: 50px;
            border-radius: 20px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: blue;
        }

        h2 {
            color: rgb(128, 0, 117);
        }

        p {
            color: black;
        }

        html {
            scroll-behavior: smooth;
        }
            
        .hero {
            background-color: pink;
            color: white;
            text-align: center;
            padding: 60px 20px;
            min-height: 200px;
        }
    </style>

</head>

<body>
    <div class="navbar">
    <a href="index.html">Home</a>
    <a href="tentang.html">Tentang</a>
    <a href="kontak.html">Kontak</a>
    </div>

    <div class="card" id="tentang">
        <h1>Tentang Saya</h1>
        <p>Saya membantu membuat website sederhana</p>
        <p>Cocok untuk UMKM, toko, dan usaha kecil</p>
    </div>

    <div class="hero">
        <h1>Halo, saya Andrew</h1>
        <p>Saya seorang Web Developer</p>
    </div>


</body>

</html>
